name: Continuous Integration

on:
  push:
    branches:
      - main
  repository_dispatch:
  pull_request:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      # Required to put a comment on commit
      contents: write
      # Required to put a comment into the pull-request
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Oxfmt Check
        run: pnpm run format-check

      - name: Oxlint Check
        run: pnpm run lint-check

      - name: TypeScript Check
        run: pnpm run type-check

      - name: Run Coverage
        run: pnpm run coverage

      - name: Report Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          comment-on: "pr,commit"

      - name: Build
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-assets
          path: lib

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org/
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-assets
          path: lib

  publish-to-npm:
    name: Publish to npm
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    needs: [test, build]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org/
          node-version: "24"

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-assets
          path: lib

      - name: Publish package to npm
        run: pnpm publish --access public --ignore-scripts --no-git-checks

  publish-to-github-release:
    name: Publish to GitHub Release
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    needs: [test, build]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-assets
          path: lib

      - name: Pack release tarball
        run: pnpm pack

      - name: Upload package tarball to Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tgz"
